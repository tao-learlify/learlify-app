<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500.5 352.23">
<defs>
<style>
  .cls-1,.cls-14,.cls-8{fill:none;}
  .cls-1{clip-rule:evenodd;}
  .cls-2{clip-path:url(#clip-path);}
  .cls-3{fill:#0c0c0c;}
  .cls-4{fill:#f9f9f9;}
  .cls-5{fill:#e5e5e5;}
  .cls-15,.cls-17,.cls-6{fill:#fff;}
  .cls-13,.cls-6,.cls-7{fill-rule:evenodd;}
  .cls-9{fill:#71b3ea;}
  .cls-10{fill:#0074b1;}
  .cls-11{fill:#004f77;}
  .cls-12{fill:#232323;}
  .cls-13{fill:#282828;}
  .cls-14{stroke:#fff;stroke-miterlimit:10;stroke-width:0.25px;}
  .cls-15{font-size:15.54px;font-family:Barlow-ExtraBold, Barlow;font-weight:800;}
  .cls-16{letter-spacing:0em;}

  /* === ANIMATIONS === */

  /* Breathing - gentle vertical bob */
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  #panda-body {
    animation: breathe 3s ease-in-out infinite;
  }

  /* Ear wiggle */
  @keyframes earWiggleL {
    0%, 82%, 100% { transform: rotate(0deg); }
    86% { transform: rotate(-5deg); }
    90% { transform: rotate(3deg); }
    94% { transform: rotate(-1deg); }
  }
  @keyframes earWiggleR {
    0%, 82%, 100% { transform: rotate(0deg); }
    86% { transform: rotate(5deg); }
    90% { transform: rotate(-3deg); }
    94% { transform: rotate(1deg); }
  }
  #ear-left {
    animation: earWiggleL 5s ease-in-out infinite;
    transform-origin: 175px 75px;
  }
  #ear-right {
    animation: earWiggleR 5s ease-in-out infinite 0.3s;
    transform-origin: 335px 75px;
  }

  /* Eye blink */
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.08); }
  }
  #eyes-group {
    animation: blink 4s ease-in-out infinite;
    transform-origin: 253px 165px;
  }

  /* Book tilt - reading */
  @keyframes readBook {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(-1.5deg); }
    70% { transform: rotate(1.5deg); }
  }
  #book-group {
    animation: readBook 4s ease-in-out infinite;
    transform-origin: 249px 285px;
  }

  /* Glasses glint */
  @keyframes glint {
    0%, 80%, 100% { opacity: 0; }
    85% { opacity: 0.7; }
    90% { opacity: 0; }
  }
  #glasses-glint {
    animation: glint 6s ease-in-out infinite;
  }

  /* Mouth smile */
  @keyframes smile {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.08); }
  }
  #mouth-group {
    animation: smile 3s ease-in-out infinite;
    transform-origin: 253px 205px;
  }

  /* Arms/hands holding book */
  @keyframes armLeft {
    0%, 70%, 100% { transform: rotate(0deg); }
    78% { transform: rotate(2deg); }
    86% { transform: rotate(-1deg); }
  }
  @keyframes armRight {
    0%, 70%, 100% { transform: rotate(0deg); }
    78% { transform: rotate(-2deg); }
    86% { transform: rotate(1deg); }
  }
  #arm-left {
    animation: armLeft 6s ease-in-out infinite;
    transform-origin: 140px 270px;
  }
  #arm-right {
    animation: armRight 6s ease-in-out infinite 0.4s;
    transform-origin: 365px 270px;
  }

  /* Book page lines shimmer */
  @keyframes pageShimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #page-lines line:nth-child(1) { animation: pageShimmer 2s ease-in-out infinite; }
  #page-lines line:nth-child(2) { animation: pageShimmer 2s ease-in-out infinite 0.2s; }
  #page-lines line:nth-child(3) { animation: pageShimmer 2s ease-in-out infinite 0.4s; }
  #page-lines line:nth-child(4) { animation: pageShimmer 2s ease-in-out infinite 0.6s; }
  #page-lines line:nth-child(5) { animation: pageShimmer 2s ease-in-out infinite 0.8s; }
  #page-lines line:nth-child(6) { animation: pageShimmer 2s ease-in-out infinite 1.0s; }

  /* Feet wiggle */
  @keyframes feetWiggle {
    0%, 80%, 100% { transform: translateX(0); }
    85% { transform: translateX(-2px); }
    90% { transform: translateX(2px); }
    95% { transform: translateX(0); }
  }
  #feet-group {
    animation: feetWiggle 5s ease-in-out infinite;
  }
</style>

<clipPath id="clip-path">
