<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500.5 375">
<defs>
<style>
  .cls-1 { clip-rule: evenodd; }
  .cls-clip { clip-path: url(#clip-path); }
  .cls-4 { fill: #f9f9f9; }
  .cls-5 { fill: #e5e5e5; }
  .cls-6 { fill: #fff; fill-rule: evenodd; }
  .cls-7 { fill-rule: evenodd; }
  .cls-13 { fill: #282828; fill-rule: evenodd; }

  /* ── SPEAKING ARCS ── */
  @keyframes speakArc {
    0%   { opacity: 0;   }
    20%  { opacity: 1;   }
    80%  { opacity: 0.8; }
    100% { opacity: 0;   }
  }
  #sarc1 { animation: speakArc 1.6s ease-in-out infinite 0s;    }
  #sarc2 { animation: speakArc 1.6s ease-in-out infinite 0.45s; }
  #sarc3 { animation: speakArc 1.6s ease-in-out infinite 0.9s;  }

  /* ── BREATHE + lean toward mic ── */
  @keyframes breatheLean {
    0%,  100% { transform: translateY(0px)  rotate(0deg);  }
    50%        { transform: translateY(-2px) rotate(-1deg); }
  }
  #panda-body { animation: breatheLean 3s ease-in-out infinite; transform-origin: 253px 185px; }

  /* ── EAR WIGGLE ── */
  @keyframes earWiggleL {
    0%, 80%, 100% { transform: rotate(0deg);  }
    85%            { transform: rotate(-6deg); }
    90%            { transform: rotate(3deg);  }
    95%            { transform: rotate(-1deg); }
  }
  @keyframes earWiggleR {
    0%, 80%, 100% { transform: rotate(0deg); }
    85%            { transform: rotate(6deg); }
    90%            { transform: rotate(-3deg); }
    95%            { transform: rotate(1deg); }
  }
  #ear-left  { animation: earWiggleL 5s ease-in-out infinite;       transform-origin: 175px 75px; }
  #ear-right { animation: earWiggleR 5s ease-in-out infinite 0.35s; transform-origin: 335px 75px; }

  /* ── BLINK ── */
  @keyframes blink {
    0%, 85%, 100% { transform: scaleY(1);    }
    91%            { transform: scaleY(0.06); }
    94%            { transform: scaleY(1);    }
  }
  #eyes-group { animation: blink 4.5s ease-in-out infinite; transform-origin: 253px 163px; }

  /* ── ARM BOB ── */
  @keyframes armBob {
    0%,  100% { transform: rotate(0deg);   }
    50%        { transform: rotate(1.8deg); }
  }
  #arm-left  { animation: armBob 3s ease-in-out infinite 0.5s; transform-origin: 130px 265px; }
  #arm-right { animation: armBob 3s ease-in-out infinite;      transform-origin: 372px 265px; }

  /* ── RECORDING LED ── */
  @keyframes recLight {
    0%,  100% { opacity: 1;   }
    50%        { opacity: 0.1; }
  }
  #record-light { animation: recLight 1.2s ease-in-out infinite; }
</style>

<clipPath id="clip-path">
  <path class="cls-1" d="M80.9,224.76c0-46-12.37-136.17,31.41-170.52C159.78,17,263.71,37.43,263.71,37.43S363.76,21,411.86,70.52c29.5,30.39,16.5,117.76,16.5,154.24,0,57.65-11.54,105-56.14,124.16-29.63,12.71-84,6.3-122.34,6.3-46,0-90,8.72-119.92-10.14C97.49,324.63,80.9,274.67,80.9,224.76Z"/>
</clipPath>
</defs>

<g id="scene">

<!-- ═══════════════════════════════════
