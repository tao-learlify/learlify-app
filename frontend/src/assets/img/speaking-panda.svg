    <path class="cls-6" d="M217.75,164.06A19.49,19.49,0,1,0,195.22,180,19.49,19.49,0,0,0,217.75,164.06Z"/>
    <path class="cls-7" d="M213.94,163.63A15.22,15.22,0,1,0,196.36,176,15.22,15.22,0,0,0,213.94,163.63Z"/>
    <path class="cls-6" d="M211.07,170.48a3.82,3.82,0,1,0-4.42,3.12A3.82,3.82,0,0,0,211.07,170.48Z"/>
