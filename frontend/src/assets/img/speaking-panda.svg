  <!-- Face lower shadow -->
  <path class="cls-5" d="M383.86,187.91a88.08,88.08,0,0,0-8.05-16.43c-1.22-2-2.36-3.75-3.44-5.41-.11.38-.23.76-.35,1.14a78.32,78.32,0,0,1,5.24,28.07c0,43.9-36.63,80.53-80.53,80.53a78.78,78.78,0,0,1-12.25-1h0q-3.21,1.24-6.54,2.27c-11.68,3.56-24.45,4.26-36.67,4.27a78.86,78.86,0,0,1-29.45-5.74c-1.73.11-3.48.19-5.25.19-43.89,0-80.52-36.63-80.52-80.53a77.86,77.86,0,0,1,1.79-16.59c-16.37,21.48-12.15,41.82-11.93,42.78,8.74,39.81,49.63,52.89,50,53,1.42.43,2.84.85,4.26,1.25,22.9,6.41,46,11.77,69.65,14.36,22.31,2.42,43.71-1,65.66-4.9,15.26-2.73,30.44-7.48,43.51-15.08,16.16-9.39,29.16-23.10,35.20-42.69C388.2,214.43,388.41,200.79,383.86,187.91Z"/>

  <!-- ARMS -->
  <g id="arm-left">
    <path d="M129.5,263.73s-38,46.83-2.4,73.53c0,0,29.49,13.36,36.56-15.75,0,0,4.23-13.33-12.65-27.47,0,0-15.4-17.19-12.1-32.14Z"/>
  </g>
  <g id="arm-right">
    <path d="M372.07,263.73s38,46.83,2.4,73.53c0,0-29.49,13.36-36.56-15.75,0,0-4.24-13.33,12.65-27.47,0,0,15.39-17.19,12.09-32.14Z"/>
  </g>

  <!-- Blush marks -->
  <ellipse cx="188" cy="204" rx="21" ry="11" fill="rgba(255,120,120,0.32)"/>
  <ellipse cx="318" cy="204" rx="21" ry="11" fill="rgba(255,120,120,0.32)"/>

  <!-- EYES GROUP (blinks as a unit) -->
  <g id="eyes-group">
    <!-- Right eye patch + iris -->
    <path d="M307.84,124.55l-2.09.33c-16.59,2.87-35,12.44-36.82,30.73a33.18,33.18,0,0,0,.34,8.79c3.34,19.93,27.21,32.57,47.43,32.84a38.75,38.75,0,0,0,7.13-.56c19.6-3.38,32.44-20.69,29.24-39.4C349.83,138.33,327,121.82,307.84,124.55Z"/>
    <path class="cls-6" d="M292,164.06A19.49,19.49,0,1,1,314.49,180,19.5,19.5,0,0,1,292,164.06Z"/>
    <path class="cls-7" d="M295.77,163.63A15.22,15.22,0,1,1,313.36,176,15.22,15.22,0,0,1,295.77,163.63Z"/>
