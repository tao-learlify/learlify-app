<!-- ═══════════════════════════════════════════
     MICROPHONE STAND  (in front of panda)
     ═══════════════════════════════════════════ -->
<g id="microphone-group">
  <!-- Stand base shadow -->
  <ellipse cx="253" cy="369" rx="50" ry="6" fill="rgba(0,0,0,0.13)"/>
  <!-- Stand base -->
  <ellipse cx="253" cy="365" rx="50" ry="8" fill="#B8B8B8"/>
  <ellipse cx="253" cy="363" rx="50" ry="8" fill="#D4D4D4"/>
  <ellipse cx="253" cy="361" rx="44" ry="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Vertical pole -->
  <rect x="250" y="292" width="7" height="72" rx="3.5" fill="#B0B0B0"/>
  <rect x="251" y="292" width="5" height="72" rx="2.5" fill="#D8D8D8"/>
  <rect x="252" y="295" width="2" height="66" rx="1"   fill="rgba(255,255,255,0.4)"/>
  <!-- Neck connector -->
  <rect x="248" y="287" width="10" height="12" rx="5" fill="#999"/>
  <rect x="249" y="287" width="8"  height="10" rx="4" fill="#BBB"/>
  <!-- Outer shell -->
  <rect x="226" y="236" width="54" height="54" rx="27" fill="#DB2777"/>
  <!-- Grill background -->
  <rect x="231" y="241" width="44" height="44" rx="22" fill="#E84F8C"/>
  <!-- Grill mesh lines -->
  <line x1="241" y1="248" x2="265" y2="248" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="237" y1="254" x2="269" y2="254" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="235" y1="260" x2="271" y2="260" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="235" y1="266" x2="271" y2="266" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="237" y1="272" x2="269" y2="272" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="241" y1="278" x2="265" y2="278" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Specular highlight -->
  <ellipse cx="246" cy="246" rx="8" ry="3.5" fill="rgba(255,255,255,0.28)" transform="rotate(-22,246,246)"/>
  <!-- Accent ring -->
  <rect x="226" y="282" width="54" height="11" rx="5.5" fill="#FF79C0"/>
  <rect x="226" y="289" width="54" height="4"  rx="0"   fill="#C4448C" opacity="0.6"/>
  <!-- Recording LED -->
  <circle id="record-light" cx="265" cy="287.5" r="3.5" fill="#FF4B4B"/>
  <circle                    cx="264" cy="286.5" r="1.2" fill="rgba(255,255,255,0.6)"/>
</g>

<!-- ═══════════════════════════════════════
     SPEAKING ARCS  (next to panda's nose)
     Three curved arcs radiating to the right,
     staggered so they pulse like a speaker icon.
     ═══════════════════════════════════════ -->
<g id="speaking-arcs" fill="none" stroke="#DB2777" stroke-linecap="round">
  <!-- innermost arc -->
  <path id="sarc1" d="M 288,196 Q 298,204 288,212" stroke-width="3.5"/>
  <!-- middle arc -->
  <path id="sarc2" d="M 288,189 Q 305,204 288,219" stroke-width="3"/>
  <!-- outer arc -->
  <path id="sarc3" d="M 288,182 Q 314,204 288,226" stroke-width="2.5"/>
</g>

</g><!-- /scene -->
</svg>
