<svg id="Capa_1" data-name="Capa 1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 190.63 150">
<defs>
<style>
  .cls-1{fill:none;}
  .cls-2{clip-path:url(#clip-path);}
  .cls-11,.cls-3{fill:#282828;}
  .cls-3{opacity:0.2;}
  .cls-4{fill:#232323;}
  .cls-5{clip-path:url(#clip-path-2);}
  .cls-6{fill:#182a3f;}
  .cls-7{fill:#24406b;}
  .cls-8{fill:#060606;}
  .cls-9{fill:#f7f7f7;}
  .cls-10,.cls-11,.cls-12{fill-rule:evenodd;}
  .cls-12,.cls-14{fill:#fff;}
  .cls-13{fill:#e3e3e3;}
  .cls-15{fill:url(#Degradado_sin_nombre_2);}

  /* === ANIMATIONS === */

  /* Breathing bob */
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1.5px); }
  }
  #panda-body { animation: breathe 3s ease-in-out infinite; }

  /* Eye blink */
  @keyframes blink {
    0%, 88%, 100% { transform: scaleY(1); }
    94% { transform: scaleY(0.05); }
  }
  #eyes-group {
    animation: blink 3.5s ease-in-out infinite;
    transform-origin: 96px 70px;
  }

  /* Eye look - eyes shift left/right like looking at participants */
  @keyframes eyeLook {
    0%, 20%, 100% { transform: translateX(0); }
    25%, 45% { transform: translateX(-1.5px); }
    50%, 70% { transform: translateX(1.5px); }
    75%, 95% { transform: translateX(0); }
  }
  #eye-pupils {
    animation: eyeLook 6s ease-in-out infinite;
  }

  /* Ear perk - like hearing someone talk */
  @keyframes earPerkL {
    0%, 60%, 100% { transform: rotate(0deg) scale(1); }
    65% { transform: rotate(-4deg) scale(1.05); }
    70% { transform: rotate(-2deg) scale(1.02); }
    75% { transform: rotate(0deg) scale(1); }
  }
  @keyframes earPerkR {
    0%, 40%, 100% { transform: rotate(0deg) scale(1); }
    45% { transform: rotate(4deg) scale(1.05); }
    50% { transform: rotate(2deg) scale(1.02); }
    55% { transform: rotate(0deg) scale(1); }
  }
  #ear-left {
    animation: earPerkL 4s ease-in-out infinite;
    transform-origin: 42px 0px;
  }
  #ear-right {
    animation: earPerkR 4s ease-in-out infinite;
    transform-origin: 155px 0px;
  }

  /* Phone tilt - adjusting grip */
  @keyframes phoneTilt {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(-2deg); }
    70% { transform: rotate(2deg); }
  }
  #phone-group {
    animation: phoneTilt 5s ease-in-out infinite;
    transform-origin: 96px 120px;
  }

  /* Phone screen glow - active call */
  @keyframes screenGlow {
    0%, 100% { filter: brightness(1); opacity: 1; }
    50% { filter: brightness(1.3); opacity: 0.9; }
  }
  #phone-screen {
    animation: screenGlow 2s ease-in-out infinite;
  }

  /* Recording indicator blink - video icon */
  @keyframes recBlink {
    0%, 40%, 100% { opacity: 1; }
    50%, 90% { opacity: 0.3; }
  }
  #video-icon {
    animation: recBlink 1.5s ease-in-out infinite;
  }

  /* User avatars float and pulse - like connecting */
  @keyframes floatUser1 {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-4px) scale(1.08); }
  }
  @keyframes floatUser2 {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-3px) scale(1.06); }
  }
  @keyframes floatUser3 {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-5px) scale(1.1); }
  }
  @keyframes floatUser4 {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-3.5px) scale(1.07); }
  }

  /* Ring pulse around avatars */
  @keyframes ringPulse {
    0%, 70%, 100% { r: 10; opacity: 0; stroke-width: 0.5; }
    80% { r: 14; opacity: 0.5; stroke-width: 0.3; }
    90% { r: 17; opacity: 0; stroke-width: 0.1; }
  }

  #user-tl {
    animation: floatUser1 3s ease-in-out infinite;
    transform-origin: 7px 97px;
  }
  #user-bl {
    animation: floatUser2 3.5s ease-in-out infinite 0.5s;
    transform-origin: 18px 128px;
  }
  #user-tr {
    animation: floatUser3 2.8s ease-in-out infinite 0.3s;
    transform-origin: 184px 97px;
  }
  #user-br {
    animation: floatUser4 3.2s ease-in-out infinite 0.7s;
    transform-origin: 172px 128px;
  }

  #ring-tl { animation: ringPulse 4s ease-out infinite; }
  #ring-bl { animation: ringPulse 4s ease-out infinite 1s; }
  #ring-tr { animation: ringPulse 4s ease-out infinite 2s; }
  #ring-br { animation: ringPulse 4s ease-out infinite 3s; }

  /* Whiskers twitch */
  @keyframes whiskerTwitchL {
    0%, 75%, 100% { transform: rotate(0deg); }
    80% { transform: rotate(-2deg); }
    85% { transform: rotate(1deg); }
    90% { transform: rotate(0deg); }
  }
  @keyframes whiskerTwitchR {
    0%, 75%, 100% { transform: rotate(0deg); }
    80% { transform: rotate(2deg); }
    85% { transform: rotate(-1deg); }
    90% { transform: rotate(0deg); }
  }
  #whiskers-left {
    animation: whiskerTwitchL 3s ease-in-out infinite;
    transform-origin: 56px 87px;
  }
  #whiskers-right {
    animation: whiskerTwitchR 3s ease-in-out infinite 0.2s;
    transform-origin: 148px 87px;
  }

  /* Head tilt - engaged in conversation */
  @keyframes headTilt {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-1.5deg); }
    75% { transform: rotate(1.5deg); }
  }
  #head-group {
    animation: headTilt 5s ease-in-out infinite;
    transform-origin: 96px 60px;
  }

  /* Shadow breathe sync */
  @keyframes shadowBreath {
    0%, 100% { transform: scaleX(1); opacity: 0.2; }
    50% { transform: scaleX(1.04); opacity: 0.15; }
  }
  #shadow {
    animation: shadowBreath 3s ease-in-out infinite;
    transform-origin: 91px 15px;
  }

  /* Headband shimmer */
  @keyframes headbandShine {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  #headband {
    animation: headbandShine 4s ease-in-out infinite;
  }

  /* Hands grip - subtle squeeze */
  @keyframes gripLeft {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(1.02); }
  }
  @keyframes gripRight {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(0.98); }
  }
  #hand-left {
    animation: gripLeft 3s ease-in-out infinite;
    transform-origin: 55px 136px;
  }
  #hand-right {
    animation: gripRight 3s ease-in-out infinite;
    transform-origin: 136px 136px;
  }
</style>

