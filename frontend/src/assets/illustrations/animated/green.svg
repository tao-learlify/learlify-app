      <path class="cls-12" d="M77,67.71a11.6,11.6,0,1,0-13.40,9.46h0A11.59,11.59,0,0,0,77,67.72Z"/>
      <path class="cls-10" d="M74.73,67.46a9.05,9.05,0,1,0-10.46,7.38h0a9,9,0,0,0,10.46-7.37Z"/>

      <!-- Pupils (look animation target) -->
      <g id="eye-pupils">
        <path class="cls-12" d="M120.10,72a2.27,2.27,0,1,1,2.63,1.85A2.28,2.28,0,0,1,120.10,72Z"/>
        <path class="cls-12" d="M73,71.54a2.27,2.27,0,1,0-2.63,1.85A2.28,2.28,0,0,0,73,71.54Z"/>
      </g>
    </g>

