      <!-- Right eye patch -->
      <path d="M111.62,79.15a43.08,43.08,0,0,1,16.46-4,82.64,82.64,0,0,1,20.84,1.39,18.35,18.35,0,0,0,2.39-12.66c-1.8-10.55-14.52-19.76-25.20-18.23l-1.16.18c-9.24,1.60-19.48,6.93-20.51,17.12a18.21,18.21,0,0,0,.19,4.89A18.67,18.67,0,0,0,111.62,79.15Z"/>
